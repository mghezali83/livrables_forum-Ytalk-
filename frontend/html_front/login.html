<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Ytalk</title>
    <link rel="stylesheet" href="../css_front/login.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="../assets/Logo.png" alt="Logo Ytalk">
            <span>YTALK</span>
        </div>

        <nav>
            <a href="index.html">Accueil</a>
            <a href="register.html" class="nav-inscription">Inscription</a>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <div class="form-card">
                <h1>Connexion</h1>
                <p class="intro">Connecte-toi pour créer des topics et envoyer des messages.</p>

                <form id="form-login">
                    <div class="input-group">
                        <label for="identifiant">Pseudo ou email</label>
                        <input type="text" id="identifiant" placeholder="Pseudo ou email" required>
                    </div>

                    <div class="input-group">
                        <label for="mot_de_passe">Mot de passe</label>
                        <input type="password" id="mot_de_passe" placeholder="Ton mot de passe" required>
                    </div>

                    <button type="submit">Se connecter</button>
                </form>

                <p id="message"></p>

                <p class="lien-bas">
                    Pas encore de compte ?
                    <a href="register.html">Créer un compte</a>
                </p>
            </div>
        </section>
    </main>

    <script src="../js_front/login.js"></script>
</body>
</html>
